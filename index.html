<!DOCTYPE html>
<html>
<head>
    <title>Get Access Key</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body style="background: #121212; color: #39ff14; font-family: monospace; text-align: center; padding-top: 50px;">
    <h1>ACCESS KEY</h1>
    <div id="keyDisplay" style="font-size: 30px; border: 2px solid #39ff14; display: inline-block; padding: 20px; border-radius: 10px;">
        WAITING...
    </div>
    <p style="color: #666;">คีย์นี้จะหมดอายุในเวลา 00:00 UTC (07:00 น. ไทย)</p>

    <script>
        const SALT = "MY_PRIVATE_KEY_999"; // *** ต้องตรงกับใน main.js ***

        // ฟังก์ชันแสดงคีย์
        async function showKey() {
            try {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                const data = await res.json();
                const dateStr = data.datetime.slice(0, 10);
                
                const hash = CryptoJS.SHA256(dateStr + SALT).toString().toUpperCase();
                document.getElementById('keyDisplay').innerText = "PRO-" + hash.substring(0, 8);
            } catch (e) {
                document.getElementById('keyDisplay').innerText = "โปรดรีเฟรชหน้าจอ (Network Error)";
            }
        }

        // ฟังก์ชันตรวจสอบการผ่านโฆษณา
        function validateAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const authTag = urlParams.get('auth'); 
            
            if (authTag !== "workink_done") {
                alert("กรุณาดูโฆษณาให้ครบถ้วนก่อนรับคีย์!");
                window.location.href = "https://link-hub.net/4226895/xQtvoU3bvjOk"; // ลิงก์ Linkvertise ด่าน 1
            } else {
                // ถ้าผ่านเงื่อนไข ให้เริ่มดึงเวลาและแสดงคีย์
                showKey(); 
            }
        }

        // รันการตรวจสอบทันทีที่โหลดหน้า
        validateAccess();
    </script>
</body>
</html>
