<!DOCTYPE html>
<html>
<head>
    <title>Get Access Key</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body style="background: #121212; color: #39ff14; font-family: monospace; text-align: center; padding-top: 50px;">
    <h1>ACCESS KEY</h1>
    <div id="keyDisplay" style="font-size: 30px; border: 2px solid #39ff14; display: inline-block; padding: 20px; border-radius: 10px;">
        WAITING...
    </div>
    <p style="color: #666;">คีย์นี้จะหมดอายุในเวลา 00:00 UTC (07:00 น. ไทย)</p>

    <script>
        const SALT = "MY_PRIVATE_KEY_999";

        async function showKey() {
            const display = document.getElementById('keyDisplay');
            
            const timeAPIs = [
                'https://worldtimeapi.org/api/timezone/Etc/UTC',
                'https://timeapi.io/api/Time/current/zone?timeZone=UTC',
                'https://worldclockapi.com/api/json/utc/now'
            ];

            let dateStr = "";

            for (let url of timeAPIs) {
                try {
                    const res = await fetch(url, { method: 'GET', timeout: 5000 });
                    const data = await res.json();
                    
                    if (data.datetime) dateStr = data.datetime.slice(0, 10);
                    else if (data.dateTime) dateStr = data.dateTime.slice(0, 10);
                    else if (data.currentDateTime) dateStr = data.currentDateTime.slice(0, 10);
                    
                    if (dateStr) break;
                } catch (e) {
                    console.warn(`Failed to fetch from ${url}, trying next...`);
                }
            }

            if (!dateStr) {
                console.error("All APIs failed. Using local system time.");
                dateStr = new Date().toISOString().slice(0, 10);
            }

            try {
                const hash = CryptoJS.SHA256(dateStr + SALT).toString().toUpperCase();
                display.innerText = "PRO-" + hash.substring(0, 8);
            } catch (e) {
                display.innerText = "Error generating key.";
            }
        }

        function validateAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const authTag = urlParams.get('auth'); 
            
            if (authTag !== "workink_done") {
                alert("กรุณาดูโฆษณาให้ครบถ้วนก่อนรับคีย์!");
                window.location.href = "https://link-hub.net/4226895/xQtvoU3bvjOk";
            } else {
                showKey(); 
            }
        }

        validateAccess();
    </script>
</body>
</html>
