<!DOCTYPE html>
<html>
<head>
    <title>Secure Key Generator</title>
    <style>
        body { background: #0c0d0e; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .key-box { border: 2px solid #5865f2; padding: 30px; display: inline-block; border-radius: 15px; background: #151921; }
        .key-text { font-size: 30px; color: #39ff14; background: #000; padding: 15px; margin: 20px 0; border: 1px dashed #5865f2; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="loading"><h2>กำลังตรวจสอบความปลอดภัย...</h2></div>

    <div id="mainContent" class="hidden">
        <div class="key-box">
            <h1>LICENSE UNLOCKED</h1>
            <p id="appTitle">Project Loading...</p>
            <div class="key-text" id="keyDisplay">GENERATING...</div>
            <p style="font-size: 11px; color: #626a73;">*คีย์ล็อก HWID ใช้งานได้เฉพาะเครื่องของคุณเท่านั้น*</p>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://discordappcal.napafin.workers.dev";

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const u = urlParams.get('u');
            const p = urlParams.get('p');
            const auth = urlParams.get('auth');
            const ref = document.referrer;

            const isFromWorkink = ref.includes("work.ink") || ref.includes("workink") || auth === "workink_done";
            if (!isFromWorkink || !u || !p) {
                document.body.innerHTML = "<h2 style='color:red;'>❌ ACCESS DENIED: Please complete Ads</h2>";
                return;
            }

            try {
                const res = await fetch(`${CLOUD_URL}/get-daily-key?u=${u}&p=${p}`);
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('keyDisplay').innerText = data.key;
                document.getElementById('appTitle').innerText = "Project: " + p;
            } catch (e) {
                document.getElementById('keyDisplay').innerText = "ERROR: SERVER DOWN";
            }
        }
        init();
    </script>
</body>
</html>
