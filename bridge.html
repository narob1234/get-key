<!DOCTYPE html>
<html>
<head>
    <title>Verifying Access...</title>
</head>
<body style="background:#0b0e14; color:white; text-align:center; padding-top:50px; font-family:sans-serif;">
    <div id="msg"><h2>Check... (Checking Security)</h2></div>

    <script>
        const CLOUD_URL = "https://discordappcal.napafin.workers.dev"; // URL Worker ของคุณ

        async function checkBypass() {
            const urlParams = new URLSearchParams(window.location.search);
            const sToken = urlParams.get('s');
            const pcName = urlParams.get('u');
            const appId = urlParams.get('p');
            const ref = document.referrer;

            // 1. ตรวจสอบต้นทาง (Referrer) เบื้องต้น
            const isFromLinkvertise = ref.includes("linkvertise.com") || ref.includes("link-hub.net");

            if (!isFromLinkvertise || !sToken) {
                document.body.innerHTML = "<h2 style='color:red;'>❌ BYPASS DETECTED</h2><p>กรุณาเข้าผ่านลิงก์โฆษณาปกติ</p>";
                return;
            }

            try {
                // 2. ส่งรหัสไปเช็คความถูกต้องที่ Cloud
                const res = await fetch(`${CLOUD_URL}/check-session?s=${sToken}`);
                const data = await res.json();

                if (data.valid) {
                    // ถ้าผ่าน ให้ไปด่าน Workink (ส่งพารามิเตอร์ทั้งหมดต่อไปด้วย)
                    setTimeout(() => {
                        window.location.href = `https://work.ink/2n0G/get-your-key?u=${pcName}&s=${sToken}&p=${appId}`;
                    }, 1500);
                } else {
                    document.body.innerHTML = "<h2 style='color:red;'>❌ SESSION EXPIRED</h2><p>รหัสหมดอายุหรือผิดพลาด กรุณาเริ่มใหม่จากโปรแกรม</p>";
                }
            } catch (e) {
                document.body.innerHTML = "<h2>ERROR: Cloud Server Down</h2>";
            }
        }

        checkBypass();
    </script>
</body>
</html>
